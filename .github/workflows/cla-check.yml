name: CLA & Commit Sign-off Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  check-cla:
    name: Validate CLA & Sign-off
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify CLA Agreement & Commits
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "Checking PR description for CLA agreement..."
          
          if [[ -z "$PR_BODY" ]]; then
            echo "::error::Pull Request description is empty. You must sign the CLA in the description."
            exit 1
          fi

          # 1. Check for the CLA agreement statement
          REQUIRED_STATEMENT="I have read and agree to the Contributor License Agreement (CLA.md)."
          if ! grep -q "$REQUIRED_STATEMENT" <<< "$PR_BODY"; then
            echo "::error::The required CLA agreement statement was not found in the Pull Request description."
            echo ""
            echo "Please edit your PR description and add the following:"
            echo "--------------------------------------------------"
            echo "$REQUIRED_STATEMENT"
            echo "Signed: FULL NAME <email@example.com>"
            echo "--------------------------------------------------"
            exit 1
          fi

          # 2. Parse the Signed: line and email
          SIGNED_LINE=$(grep -oE "Signed:[[:space:]]*.*<.*>" <<< "$PR_BODY" | head -n 1)
          if [[ -z "$SIGNED_LINE" ]]; then
            echo "::error::Could not find a valid signature line matching 'Signed: FULL NAME <email@example.com>' in the PR description."
            exit 1
          fi

          SIGNED_EMAIL=$(echo "$SIGNED_LINE" | grep -oP "<[^>]+>" | tr -d '<>' | head -n 1)
          if [[ -z "$SIGNED_EMAIL" ]]; then
            echo "::error::Could not extract a valid email address from the signature line: $SIGNED_LINE"
            exit 1
          fi

          echo "Found CLA signature in PR body: $SIGNED_LINE"

          # 3. Retrieve commits and check Signed-off-by trailers
          echo "Fetching commits for Pull Request #$PR_NUMBER..."
          COMMITS_JSON=$(gh pr view "$PR_NUMBER" --json commits)

          # Loop through each commit
          HAS_ERRORS=0
          while read -r commit_json; do
            oid=$(echo "$commit_json" | jq -r '.oid')
            headline=$(echo "$commit_json" | jq -r '.messageHeadline')
            body=$(echo "$commit_json" | jq -r '.messageBody')
            
            # Reconstruct full commit message
            full_msg="${headline}"$'\n\n'"${body}"
            
            # Check for Signed-off-by
            if ! grep -q "Signed-off-by:" <<< "$full_msg"; then
              echo "::error::Commit ${oid:0:7} ('$headline') is missing the Signed-off-by trailer."
              HAS_ERRORS=1
              continue
            fi
            
            # Parse Signed-off-by email
            SOB_EMAIL=$(echo "$full_msg" | grep -oP "Signed-off-by:[[:space:]]*.*<.*>" | grep -oP "<[^>]+>" | tr -d '<>' | head -n 1)
            if [[ -z "$SOB_EMAIL" ]]; then
              echo "::error::Commit ${oid:0:7} has an invalid Signed-off-by trailer format."
              HAS_ERRORS=1
              continue
            fi
            
            if [[ "$SOB_EMAIL" != "$SIGNED_EMAIL" ]]; then
              echo "::warning::Commit ${oid:0:7} signature email ($SOB_EMAIL) does not match the PR body signature email ($SIGNED_EMAIL)."
            fi
            
            echo "Commit ${oid:0:7} ('$headline') is signed-off by $SOB_EMAIL"
          done < <(echo "$COMMITS_JSON" | jq -c '.commits[]')

          if [[ "$HAS_ERRORS" -eq 1 ]]; then
            echo ""
            echo "::error::One or more commits are missing valid 'Signed-off-by' trailers."
            echo "To fix this, you can run: git commit --amend -s (for your last commit) or an interactive rebase to sign off older commits."
            exit 1
          fi

          echo "All checks passed! CLA signature verified."
